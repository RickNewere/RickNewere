name: Update commit stats

on:
  schedule:
    # Daily update at 17:00 Italian time (15:00 UTC)
    - cron: "0 15 * * *"
  workflow_dispatch:
  # Refresh on the profile repo's own commits
  push:
    branches: [main]
  # Fired by the notify workflow in other repos on every push
  repository_dispatch:
    types: [refresh-stats]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Regenerate stats
        run: node scripts/update-stats.mjs
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Commit and push if changed
        run: |
          git config user.name "RickNewere"
          git config user.email "79905603+RickNewere@users.noreply.github.com"
          git add README.md
          git diff --quiet --cached || git commit -m "Update commit activity stats"
          git push
